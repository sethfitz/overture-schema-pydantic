[project]
name = "overture-schema-water-type"
version = "0.1.0"
description = "Pydantic schemas for Overture Maps water features"
authors = [
    {name = "Overture Maps", email = "info@overturemaps.org"}
]
dependencies = [
    "overture-schema-core",
    "pydantic>=2.0",
]
requires-python = ">=3.8"
readme = "README.md"
license = {text = "MIT"}

[project.urls]
Homepage = "https://github.com/overturemaps/pydantic-schema"
Repository = "https://github.com/overturemaps/pydantic-schema"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
include = [
  "/src",
]

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]