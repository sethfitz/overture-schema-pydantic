[project]
name = "overture-schema-transportation-theme"
version = "0.1.0"
description = "Overture Maps transportation theme shared structures and connector type"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "overture-schema-core",
    "overture-schema-transportation-common",
    "overture-schema-segment-type",
    "pydantic>=2.0",
]

[tool.uv.sources]
overture-schema-core = { workspace = true }
overture-schema-transportation-common = { workspace = true }
overture-schema-segment-type = { workspace = true }


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]
