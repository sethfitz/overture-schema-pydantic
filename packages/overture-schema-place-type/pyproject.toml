[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "overture-schema-place-type"
version = "0.1.0"
description = "Pydantic models for Overture Maps place type"
requires-python = ">=3.8"
dependencies = [
    "pydantic>=2.0",
    "pydantic[email]",
    "overture-schema-core",
    "overture-schema-validation",
]

[tool.uv.sources]
overture-schema-core = { workspace = true }
overture-schema-validation = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
    "mypy",
]

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]