[project]
name = "overture-schema-buildings-theme"
version = "0.1.0"
description = "Overture Maps buildings theme shared structures"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "overture-schema-core",
    "overture-schema-buildings-common",
    "overture-schema-building-type",
    "overture-schema-building-part-type",
    "pydantic>=2.0",
]

[project.urls]
Homepage = "https://github.com/OvertureMaps/pydantic-schema"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]