[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "overture-schema-core"
version = "0.1.0"
description = "Core schemas for Overture Maps"
dependencies = [
    "pydantic>=2.0",
    "typing-extensions",
    "overture-schema-validation",
    "shapely",
]

[tool.uv.sources]
overture-schema-validation = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]

[dependency-groups]
dev = [
    "pytest-subtests>=0.14.2",
]
