[project]
name = "overture-schema-places-theme"
version = "0.1.0"
description = "Overture Maps places theme shared structures"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "overture-schema-core",
    "overture-schema-place-type",
    "pydantic>=2.0",
]

[tool.uv.sources]
overture-schema-core = { workspace = true }
overture-schema-place-type = { workspace = true }


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]
