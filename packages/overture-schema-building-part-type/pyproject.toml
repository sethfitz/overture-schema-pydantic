[project]
name = "overture-schema-building-part-type"
version = "0.1.0"
description = "Pydantic schemas for Overture Maps building_part type"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
    "overture-schema-core",
    "overture-schema-buildings-common",
]

[tool.uv.sources]
overture-schema-core = { workspace = true }
overture-schema-buildings-common = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=7.0",
    "ruff",
    "mypy",
]


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]