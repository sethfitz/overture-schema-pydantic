[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "overture-schema-segment-type"
version = "0.1.0"
description = "Pydantic schemas for Overture Maps segment type"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
    "overture-schema-core",
    "overture-schema-validation",
    "overture-schema-transportation-common",
    "overture-schema-transportation-rules",
]

[tool.uv.sources]
overture-schema-core = { workspace = true }
overture-schema-validation = { workspace = true }
overture-schema-transportation-common = { workspace = true }
overture-schema-transportation-rules = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
    "mypy",
]


[tool.hatch.build.targets.wheel]
packages = ["src/overture"]