[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "overture-schema-segment-type"
version = "0.1.0"
description = "Pydantic schemas for Overture Maps segment type"
authors = [
    { name = "Overture Maps Foundation" },
]
dependencies = [
    "pydantic>=2.0",
    "overture-schema-core",
    "overture-schema-validation",
    "overture-schema-transportation-common",
    "overture-schema-transportation-rules",
]
requires-python = ">=3.10"

[project.urls]
Homepage = "https://github.com/overturemaps/pydantic-schema"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]