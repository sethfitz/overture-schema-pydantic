[project]
name = "overture-schema-division-boundary-type"
version = "0.1.0"
description = "Pydantic models for Overture Maps division boundary type"
authors = [
    {name = "Overture Maps Foundation", email = "info@overturemaps.org"}
]
dependencies = [
    "overture-schema-core",
    "overture-schema-divisions-common",
    "pydantic>=2.0",
]
readme = "README.md"
requires-python = ">=3.10"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]

[project.urls]
Homepage = "https://overturemaps.org"
Repository = "https://github.com/OvertureMaps/pydantic-schema"