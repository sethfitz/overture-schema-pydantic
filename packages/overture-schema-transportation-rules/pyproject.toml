[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "overture-schema-transportation-rules"
version = "0.1.0"
description = "Shared transportation theme structures for Overture Maps schema"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Overture Maps Foundation"}
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.10"
dependencies = [
    "overture-schema-core",
    "overture-schema-validation",
    "pydantic>=2.0",
]

[project.urls]
Homepage = "https://github.com/OvertureMaps/overture-schema"
Repository = "https://github.com/OvertureMaps/overture-schema"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]