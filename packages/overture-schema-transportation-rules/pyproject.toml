[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "overture-schema-transportation-rules"
version = "0.1.0"
description = "Shared transportation theme structures for Overture Maps schema"
readme = "README.md"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.10"
dependencies = [
    "overture-schema-core",
    "overture-schema-validation",
    "pydantic>=2.0",
]

[tool.uv.sources]
overture-schema-core = { workspace = true }
overture-schema-validation = { workspace = true }


[tool.hatch.build.targets.wheel]
packages = ["src/overture"]