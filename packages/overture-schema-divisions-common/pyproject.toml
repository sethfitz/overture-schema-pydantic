[project]
name = "overture-schema-divisions-common"
version = "0.1.0"
description = "Overture Maps divisions common structures and enums"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "overture-schema-core",
    "overture-schema-validation",
    "pydantic>=2.0",
]

[project.optional-dependencies]
test = [
    "pytest>=7.0",
]

[tool.uv.sources]
overture-schema-core = { workspace = true }
overture-schema-validation = { workspace = true }


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]