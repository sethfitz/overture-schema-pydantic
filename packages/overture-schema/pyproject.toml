[project]
name = "overture-schema"
version = "0.1.0"
description = "Complete Overture Maps schema collection with all themes and types"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "overture-schema-core",
    # Base theme
    "overture-schema-base-theme",
    # Address theme
    "overture-schema-addresses-theme",
    # Buildings theme
    "overture-schema-buildings-theme",
    # Divisions theme
    "overture-schema-divisions-theme",
    # Places theme
    "overture-schema-places-theme",
    # Transportation theme
    "overture-schema-transportation-theme",
    "pydantic>=2.0",
]

[project.urls]
Homepage = "https://github.com/OvertureMaps/pydantic-schema"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]