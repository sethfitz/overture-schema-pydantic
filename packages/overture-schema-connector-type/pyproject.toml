[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "overture-schema-connector-type"
version = "0.1.0"
description = "Pydantic schemas for Overture Maps connector type"
authors = [
    { name = "Overture Maps Foundation" },
]
dependencies = [
    "pydantic>=2.0",
    "overture-schema-core",
    "overture-schema-transportation-common",
]
requires-python = ">=3.10"

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
    "mypy",
]

[project.urls]
Homepage = "https://github.com/overturemaps/pydantic-schema"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]