[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "overture-schema-division-type"
version = "0.1.0"
description = "Overture Maps division type Pydantic schemas"
dependencies = [
    "pydantic>=2.0.0",
    "overture-schema-core",
    "overture-schema-divisions-common",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
    "mypy",
]

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]