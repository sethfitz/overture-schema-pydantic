[project]
name = "overture-schema-base-theme"
version = "0.1.0"
description = "Overture Maps base theme shared structures and bathymetry models"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "overture-schema-core",
    "overture-schema-base-common",
    "overture-schema-infrastructure-type",
    "overture-schema-land-type",
    "overture-schema-water-type",
    "overture-schema-validation",
    "pydantic>=2.0",
]

[dependency-groups]
dev = [
    "pytest>=7.0",
    "ruff",
    "mypy",
]

[tool.uv.sources]
overture-schema-core = { workspace = true }
overture-schema-base-common = { workspace = true }
overture-schema-infrastructure-type = { workspace = true }
overture-schema-land-type = { workspace = true }
overture-schema-water-type = { workspace = true }
overture-schema-validation = { workspace = true }


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]
