[project]
name = "overture-schema-base-common"
version = "0.1.0"
description = "Common structures shared across Overture Maps base theme types"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "overture-schema-core",
    "pydantic>=2.0",
]

[tool.uv.sources]
overture-schema-core = { workspace = true }


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]