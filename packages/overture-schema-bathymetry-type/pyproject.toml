[project]
name = "overture-schema-bathymetry-type"
version = "0.1.0"
description = "Overture Maps bathymetry type schema"
requires-python = ">=3.10"
readme = "README.md"
dependencies = [
    "overture-schema-core",
    "pydantic>=2.0",
]

[tool.uv.sources]
overture-schema-core = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
    "mypy",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]