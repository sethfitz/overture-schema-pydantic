[project]
name = "overture-schema-bathymetry-type"
version = "0.1.0"
description = "Overture Maps bathymetry type schema"
authors = [
    {name = "Claude Code", email = "noreply@anthropic.com"},
]
dependencies = [
    "overture-schema-core",
    "pydantic>=2.0",
]
requires-python = ">=3.10"
readme = "README.md"
license = {text = "MIT"}

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]