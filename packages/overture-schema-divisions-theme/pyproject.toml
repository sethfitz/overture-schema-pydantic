[project]
name = "overture-schema-divisions-theme"
version = "0.1.0"
description = "Overture Maps divisions theme shared structures and division area type"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "overture-schema-core",
    "overture-schema-divisions-common",
    "overture-schema-division-type",
    "overture-schema-division-boundary-type",
    "pydantic>=2.0",
]

[dependency-groups]
dev = [
    "pytest>=7.0",
    "ruff",
    "mypy",
]

[tool.uv.sources]
overture-schema-core = { workspace = true }
overture-schema-divisions-common = { workspace = true }
overture-schema-division-type = { workspace = true }
overture-schema-division-boundary-type = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]
