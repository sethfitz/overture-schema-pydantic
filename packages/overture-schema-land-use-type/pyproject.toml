[project]
name = "overture-schema-land-use-type"
version = "0.1.0"
description = "Land use features from OpenStreetMap"
requires-python = ">=3.10"
readme = "README.md"
dependencies = [
    "overture-schema-core",
    "overture-schema-base-common",
    "pydantic>=2.0",
]

[tool.uv.sources]
overture-schema-core = { workspace = true }
overture-schema-base-common = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=7.0",
    "ruff",
    "mypy",
]


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
include = [
  "/src",
]

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]