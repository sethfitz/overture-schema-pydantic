[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "overture-schema-address-type"
version = "0.1.0"
description = "Overture Maps address type Pydantic schemas"
dependencies = [
    "pydantic>=2.0.0",
    "overture-schema-core",
    "pytest>=8.4.1",
    "ruff>=0.12.1",
]

[tool.uv.sources]
overture-schema-core = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
    "mypy",
]

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
