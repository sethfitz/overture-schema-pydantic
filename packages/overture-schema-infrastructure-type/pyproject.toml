[project]
name = "overture-schema-infrastructure-type"
version = "0.1.0"
description = "Pydantic schemas for Overture Maps infrastructure features"
requires-python = ">=3.10"
readme = "README.md"
dependencies = [
    "overture-schema-core",
    "overture-schema-base-common",
    "pydantic>=2.0",
]

[tool.uv.sources]
overture-schema-core = { workspace = true }
overture-schema-base-common = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
    "mypy",
]


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
include = [
  "/src",
]

[tool.hatch.build.targets.wheel]
packages = ["src/overture"]
